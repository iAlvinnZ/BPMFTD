<!doctype html>
<html>
  <head>
    <title>Contacts</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body
    class="d-flex flex-column"
    style="
      background: linear-gradient(#1c9f1c, #006e07);
      min-height: 100vh;
      font-family: inter;
    "
  >
    <div class="container">
      <div class="badge rounded-pill bg-light mt-5 px-3 py-1">
        <h1 class="text-body d-flex align-items-center justify-content-center">
          <b>Contacts</b>
        </h1>
      </div>

      <div class="row mt-4">
        <div class="col-sm-6">
          <h2 class="text-white">Get In Touch</h2>
        </div>
        <div class="col-sm-6">
          <h2 class="text-white">Quick Connect</h2>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-sm-6">
          <p class="text-white" style="font-size: 22px">
            Kritik & saran anda sangat dibutuhkan untuk <br />inovasi/pelayanan
            kami.
          </p>
        </div>
        <div class="col-sm-6">
          <a href="mailto:bpmftd@machung.ac.id" class="text-decoration-none">
            <div
              class="p-3 rounded-pill bg-light d-flex align-items-center text-dark"
            >
              <img
                src="mail.png"
                alt="Mail"
                class="me-3"
                style="width: 45px; height: auto"
              />
              bpmftd@machung.ac.id
            </div>
          </a>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-sm-6">
          <form action="https://formspree.io/f/mpqoelej" method="POST">
            <div class="border-bottom">
              <label for="name" class="form-label text-white">Nama</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                style="border: none; background: transparent; color: #ffffff"
              />
            </div>
            <div class="border-bottom">
              <label for="email" class="form-label text-white">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                style="border: none; background: transparent; color: #ffffff"
              />
            </div>
            <div class="border-bottom">
              <label for="comment" class="form-label text-white"
                >Kritik & Saran</label
              >
              <textarea
                class="form-control"
                id="comment"
                name="text"
                rows="4"
                style="border: none; background: transparent; color: #ffffff"
              ></textarea>
            </div>
            <button
              type="submit"
              class="btn btn-light rounded-pill mt-3 d-flex align-items-left"
            >
              <b>Submit</b>
              <img
                src="send.png"
                alt="Send"
                style="width: 20px; height: auto"
              />
            </button>
          </form>
        </div>

        <div class="col-sm-6">
          <div class="row text-center g-2">
            <div class="col-4">
              <a
                href="https://www.youtube.com/@BPMFTDUniversitasMaChung-b1d"
                class="text-decoration-none"
              >
                <div
                  class="rounded bg-light d-flex flex-column justify-content-center align-items-center"
                  style="height: 200px; width: 175px; margin: auto"
                >
                  <img src="yt.png" alt="YouTube" style="height: 80px" />
                  <div class="small mt-2 text-dark" style="font-size: 16px">
                    <b>YouTube</b>
                  </div>
                </div>
              </a>
            </div>

            <div class="col-4">
              <a
                href="https://www.instagram.com/bpmftdmachung/"
                class="text-decoration-none"
              >
                <div
                  class="rounded bg-light d-flex flex-column justify-content-center align-items-center"
                  style="height: 200px; width: 175px; margin: auto"
                >
                  <img src="ig.png" alt="Instagram" style="height: 80px" />
                  <div class="small mt-2 text-dark" style="font-size: 16px">
                    <b>Instagram</b>
                  </div>
                </div>
              </a>
            </div>

            <div class="col-4">
              <a
                href="https://www.tiktok.com/@bpm.ftd.machung"
                class="text-decoration-none"
              >
                <div
                  class="rounded bg-light d-flex flex-column justify-content-center align-items-center"
                  style="height: 200px; width: 175px; margin: auto"
                >
                  <img
                    src="ic_baseline-tiktok.png"
                    alt="TikTok"
                    style="height: 80px"
                  />
                  <div class="small mt-2 text-dark" style="font-size: 16px">
                    <b>TikTok</b>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="text-center text-lg-start bg-light text-muted mt-auto">
      <div
        class="text-center p-4"
        style="background-color: rgba(0, 0, 0, 0.05)"
      >
        © 2026 All rights reserved. BPM FTD
      </div>
    </footer>
  </body>
</html>
